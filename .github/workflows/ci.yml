name: QA Copilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'   # runs every day at 8AM UTC automatically

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
      JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum
      ENVIRONMENT: development
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: adminpass
      ADMIN_EMAIL: admin@test.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        id: run_tests
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junit-xml=test-results.xml \
            --cov=backend \
            --cov=knowledge \
            --cov-report=xml \
            --cov-report=term-missing \
            2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Generate test summary
        if: always()
        run: |
          echo "## QA Copilot Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Publish test results in GitHub UI
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          comment_mode: off

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-output.txt
            test-results.xml

      - name: Build email body
        id: email_meta
        if: always()
        run: |
          STATUS="PASSED"
          EMOJI="✅"
          if grep -q "failed\|error" test-output.txt --ignore-case; then
            STATUS="FAILED"
            EMOJI="❌"
          fi

          SUMMARY=$(tail -5 test-output.txt)
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")

          cat > email-body.txt << EOF
          QA Copilot Pipeline Report
          ==========================
          Status   : $EMOJI $STATUS
          Time     : $TIMESTAMP
          Branch   : ${{ github.ref_name }}
          Commit   : ${{ github.sha }}
          Triggered: ${{ github.actor }}

          Test Summary:
          $SUMMARY

          Full results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ steps.email_meta.outputs.emoji }} QA Copilot CI — ${{ steps.email_meta.outputs.status }} | ${{ github.ref_name }}"
          to: sudoh141@gmail.com
          from: QA Copilot CI <${{ secrets.GMAIL_USERNAME }}>
          body: file://email-body.txt
